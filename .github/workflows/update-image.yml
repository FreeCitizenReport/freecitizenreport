name: Update Hero Image
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests beautifulsoup4 Pillow

      - name: Fetch all images
        run: |
          python - <<'EOF'
          import requests, re, sys, io
          from bs4 import BeautifulSoup
          from PIL import Image

          HEADERS = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0 Safari/537.36"}

          def get_og_image(url):
              try:
                  r = requests.get(url, headers=HEADERS, timeout=12)
                  soup = BeautifulSoup(r.text, "html.parser")
                  tag = (soup.find("meta", property="og:image") or
                         soup.find("meta", attrs={"name": "og:image"}) or
                         soup.find("meta", property="twitter:image"))
                  if tag and tag.get("content"):
                      print(f"  og:image: {tag['content'][:80]}")
                      return tag["content"]
              except Exception as e:
                  print(f"  scrape failed: {e}")
              return None

          def fetch_and_score(img_url):
              try:
                  r = requests.get(img_url, headers={"User-Agent": "Mozilla/5.0"}, timeout=12)
                  if r.status_code != 200 or len(r.content) < 15000:
                      print(f"  x bad response/size ({r.status_code}, {len(r.content)} bytes)")
                      return None
                  img = Image.open(io.BytesIO(r.content))
                  w, h = img.size
                  ratio = w / h
                  if w < 400 or h < 150 or ratio < 1.0:
                      print(f"  x rejected {w}x{h} ratio={ratio:.2f}")
                      return None
                  score = w * h
                  print(f"  + accepted {w}x{h} score={score}")
                  return (score, r.content)
              except Exception as e:
                  print(f"  x error: {e}")
              return None

          def save_best(candidates, filename):
              if not candidates:
                  print(f"  No valid images for {filename}")
                  return False
              candidates.sort(key=lambda x: x[0], reverse=True)
              with open(filename, "wb") as f:
                  f.write(candidates[0][1])
              print(f"  >> Saved {filename}")
              return True

          with open("index.html", "r") as f:
              html = f.read()

          hero_urls = list(dict.fromkeys(
              re.findall(r'class="hero[^"]*"\s+href="([^"]+)"', html)
          ))
          print(f"Hero URLs: {hero_urls}\n")

          def url_after_img(src_name):
              pattern = rf'src="{src_name}".*?<a[^>]+href="([^"]+)"'
              m = re.search(pattern, html, re.DOTALL)
              return m.group(1) if m else None

          slots = [
              (hero_urls,                        "hero.jpg",       True),
              (url_after_img("img_left1.jpg"),   "img_left1.jpg",  False),
              (url_after_img("img_left2.jpg"),   "img_left2.jpg",  False),
              (url_after_img("img_center1.jpg"), "img_center1.jpg", False),
              (url_after_img("img_center2.jpg"), "img_center2.jpg", False),
              (url_after_img("img_right1.jpg"),  "img_right1.jpg", False),
          ]

          for url_or_list, filename, multi in slots:
              print(f"\n=== {filename} ===")
              candidates = []
              urls = url_or_list if multi else ([url_or_list] if url_or_list else [])
              for url in urls:
                  if not url:
                      continue
                  print(f"Trying: {url[:80]}")
                  og = get_og_image(url)
                  if og:
                      result = fetch_and_score(og)
                      if result:
                          candidates.append(result)
              if not save_best(candidates, filename) and filename == "hero.jpg":
                  try:
                      fb = requests.get("https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/US_Navy_030501-N-5362A-004_President_George_W._Bush_speaks_aboard_USS_Abraham_Lincoln.jpg/640px-US_Navy_030501-N-5362A-004_President_George_W._Bush_speaks_aboard_USS_Abraham_Lincoln.jpg", timeout=12)
                      with open("hero.jpg", "wb") as f:
                          f.write(fb.content)
                      print("  >> Saved Wikipedia fallback for hero")
                  except:
                      pass

          print("\nAll done.")
          EOF

      - name: Commit images
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          for f in hero.jpg img_left1.jpg img_left2.jpg img_center1.jpg img_center2.jpg img_right1.jpg; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --staged --quiet || git commit -m "Update images"
          git push
