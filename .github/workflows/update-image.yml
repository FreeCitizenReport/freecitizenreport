name: Update Hero Image
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests beautifulsoup4 Pillow

      - name: Fetch all images
        run: |
          python - <<'EOF'
          import requests, re, sys, io
          from bs4 import BeautifulSoup
          from PIL import Image

          HEADERS = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0 Safari/537.36"}

          def get_og_image(url):
              """Fetch og:image URL from an article page."""
              try:
                  r = requests.get(url, headers=HEADERS, timeout=12)
                  soup = BeautifulSoup(r.text, "html.parser")
                  tag = (soup.find("meta", property="og:image") or
                         soup.find("meta", attrs={"name": "og:image"}) or
                         soup.find("meta", property="twitter:image"))
                  if tag and tag.get("content"):
                      return tag["content"]
              except Exception as e:
                  print(f"  og:image scrape failed for {url}: {e}")
              return None

          def score_image(img_bytes):
              """Score image by area. Higher = more compelling. Returns (score, width, height) or None."""
              try:
                  img = Image.open(io.BytesIO(img_bytes))
                  w, h = img.size
                  if w < 400 or h < 200:
                      return None  # too small
                  ratio = w / h
                  if ratio < 1.0:
                      return None  # portrait — skip (likely headshot/logo)
                  if len(img_bytes) < 20000:
                      return None  # file too small — likely placeholder
                  score = w * h  # area is the primary metric
                  return (score, w, h)
              except Exception as e:
                  print(f"  Image scoring failed: {e}")
                  return None

          def fetch_and_score(img_url):
              """Download image, return (score, bytes) or None."""
              try:
                  r = requests.get(img_url, headers={"User-Agent": "Mozilla/5.0"}, timeout=12)
                  if r.status_code != 200:
                      return None
                  result = score_image(r.content)
                  if result:
                      score, w, h = result
                      print(f"  ✓ {w}x{h} score={score} {img_url[:80]}")
                      return (score, r.content)
                  else:
                      print(f"  ✗ rejected {img_url[:80]}")
                      return None
              except Exception as e:
                  print(f"  fetch failed: {e}")
                  return None

          def save_best(candidates, filename):
              """From a list of (score, bytes), save the highest scoring one."""
              if not candidates:
                  print(f"  No valid images for {filename}")
                  return False
              candidates.sort(key=lambda x: x[0], reverse=True)
              with open(filename, "wb") as f:
                  f.write(candidates[0][1])
              print(f"  Saved {filename} (score={candidates[0][0]})")
              return True

          # ── Parse index.html ──────────────────────────────────────────
          with open("index.html", "r") as f:
              html = f.read()

          # Hero headline URLs (unique, preserving order)
          hero_urls = list(dict.fromkeys(
              re.findall(r'class="hero[^"]*"\s+href="([^"]+)"', html)
          ))
          print(f"\nHero URLs found: {hero_urls}\n")

          # Column top-story URLs: first <a href> inside each column td
          col_sections = re.findall(
              r'<!-- (LEFT|CENTER|RIGHT) col.*?</td>', html, re.DOTALL
          )
          col_first_urls = {}
          for label, section in zip(["left","center","right"],
                                    re.findall(r'<!-- (?:LEFT|CENTER|RIGHT) col.*?(?=<!-- (?:LEFT|CENTER|RIGHT) col|</tr>)', html, re.DOTALL)):
              urls = re.findall(r'<a[^>]+href="([^"]+)"', section)
              if urls:
                  col_first_urls[label] = urls[0]

          # Mid-column story URLs: link immediately after each mid-col img tag
          # Strategy: grab all links in each column section, use index 4 as mid-point
          col_mid_urls = {}
          for label, section in zip(["left","center","right"],
                                    re.findall(r'<!-- (?:LEFT|CENTER|RIGHT) col.*?(?=<!-- (?:LEFT|CENTER|RIGHT) col|</tr>)', html, re.DOTALL)):
              urls = re.findall(r'<a[^>]+href="([^"]+)"', section)
              if len(urls) > 4:
                  col_mid_urls[label] = urls[len(urls)//2]

          print(f"Col first URLs: {col_first_urls}")
          print(f"Col mid URLs: {col_mid_urls}\n")

          # ── HERO IMAGE: try all hero URLs, pick best image ────────────
          print("=== Fetching HERO candidates ===")
          hero_candidates = []
          seen_img_urls = set()
          for url in hero_urls:
              print(f"Trying: {url}")
              og = get_og_image(url)
              if og and og not in seen_img_urls:
                  seen_img_urls.add(og)
                  result = fetch_and_score(og)
                  if result:
                      hero_candidates.append(result)

          if not save_best(hero_candidates, "hero.jpg"):
              # Last resort fallback
              try:
                  fb = requests.get(
                      "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/US_Navy_030501-N-5362A-004_President_George_W._Bush_speaks_aboard_USS_Abraham_Lincoln.jpg/640px-US_Navy_030501-N-5362A-004_President_George_W._Bush_speaks_aboard_USS_Abraham_Lincoln.jpg",
                      timeout=12)
                  with open("hero.jpg", "wb") as f:
                      f.write(fb.content)
                  print("Saved Wikipedia fallback for hero")
              except:
                  pass

          # ── COLUMN THUMBNAILS: one per slot ───────────────────────────
          slots = [
              ("left",   col_first_urls.get("left"),   "img_left1.jpg"),
              ("left",   col_mid_urls.get("left"),      "img_left2.jpg"),
              ("center", col_first_urls.get("center"),  "img_center1.jpg"),
              ("center", col_mid_urls.get("center"),    "img_center2.jpg"),
              ("right",  col_first_urls.get("right"),   "img_right1.jpg"),
          ]

          for col, url, filename in slots:
              print(f"\n=== {filename} from {url} ===")
              if not url:
                  print("  No URL found, skipping")
                  continue
              og = get_og_image(url)
              if og:
                  result = fetch_and_score(og)
                  if result:
                      with open(filename, "wb") as f:
                          f.write(result[1])
                      print(f"  Saved {filename}")
                  else:
                      print(f"  Image rejected for {filename}")
              else:
                  print(f"  No og:image found for {filename}")

          print("\nDone.")
          EOF

      - name: Commit images
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add hero.jpg img_left1.jpg img_left2.jpg img_center1.jpg img_center2.jpg img_right1.jpg
          git diff --staged --quiet || git commit -m "Update images from og:image scrape"
          git push
