name: Update Hero Image
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests beautifulsoup4 Pillow

      - name: Fetch all images
        run: |
          python - <<'EOF'
          import requests, re, sys, io, time
          from bs4 import BeautifulSoup
          from PIL import Image

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0 Safari/537.36",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Accept-Language": "en-US,en;q=0.5",
          }

          # Known junk images to reject by URL substring
          JUNK_PATTERNS = [
              "npr.org/assets/img/podcast",
              "podcast-thumbnail",
              "logo",
              "favicon",
              "avatar",
              "placeholder",
              "default-og",
              "static/images/social",
          ]

          def is_junk_url(url):
              u = url.lower()
              return any(p in u for p in JUNK_PATTERNS)

          def fetch_via_archive(url):
              """Fetch page HTML via archive.is/newest/, following redirects to actual snapshot."""
              archive_url = f"https://archive.is/newest/{url}"
              try:
                  # Step 1: GET archive.is/newest/ — it will redirect to snapshot URL
                  r = requests.get(archive_url, headers=HEADERS, timeout=15, allow_redirects=False)
                  
                  # Step 2: Follow the redirect to the actual snapshot
                  if r.status_code in (301, 302, 303, 307, 308):
                      snapshot_url = r.headers.get("Location", "")
                      if snapshot_url:
                          print(f"  archive.is redirect -> {snapshot_url[:60]}")
                          r2 = requests.get(snapshot_url, headers=HEADERS, timeout=15)
                          if r2.status_code == 200 and len(r2.text) > 5000:
                              return r2.text
                  
                  # Step 3: Sometimes archive.is returns 200 directly with the snapshot
                  if r.status_code == 200 and len(r.text) > 5000:
                      # Check it's not a captcha/waiting page
                      if "Redirecting" not in r.text[:500] and "DDoS" not in r.text[:500]:
                          return r.text
                  
                  print(f"  archive.is returned {r.status_code}, trying direct fetch")
              except Exception as e:
                  print(f"  archive.is failed: {e}")
              
              # Step 4: Fall back to direct fetch
              try:
                  r = requests.get(url, headers=HEADERS, timeout=15)
                  if r.status_code == 200:
                      return r.text
              except Exception as e:
                  print(f"  direct fetch failed: {e}")
              
              return None

          def get_og_image(url):
              """Get og:image from a URL, trying archive.is first."""
              print(f"  Fetching: {url[:70]}")
              html = fetch_via_archive(url)
              if not html:
                  return None
              try:
                  soup = BeautifulSoup(html, "html.parser")
                  # Try multiple meta tag formats
                  tag = (soup.find("meta", property="og:image") or
                         soup.find("meta", property="og:image:url") or
                         soup.find("meta", attrs={"name": "og:image"}) or
                         soup.find("meta", property="twitter:image") or
                         soup.find("meta", attrs={"name": "twitter:image"}))
                  if tag and tag.get("content"):
                      img_url = tag["content"]
                      # Make sure URL is absolute
                      if img_url.startswith("//"):
                          img_url = "https:" + img_url
                      if not img_url.startswith("http"):
                          return None
                      if is_junk_url(img_url):
                          print(f"  x junk URL rejected: {img_url[:60]}")
                          return None
                      print(f"  og:image: {img_url[:70]}")
                      return img_url
              except Exception as e:
                  print(f"  og:image parse failed: {e}")
              return None

          def fetch_and_score(img_url):
              """Download image and score by pixel area. Returns (score, bytes) or None."""
              try:
                  r = requests.get(img_url, headers={"User-Agent": "Mozilla/5.0"}, timeout=12)
                  if r.status_code != 200:
                      print(f"  x download failed: status {r.status_code}")
                      return None
                  if len(r.content) < 15000:
                      print(f"  x too small: {len(r.content)} bytes")
                      return None
                  img = Image.open(io.BytesIO(r.content))
                  w, h = img.size
                  ratio = w / h
                  if w < 400 or h < 150:
                      print(f"  x too small: {w}x{h}")
                      return None
                  if ratio < 1.0:
                      print(f"  x portrait rejected: {w}x{h}")
                      return None
                  score = w * h
                  print(f"  + accepted {w}x{h} score={score}")
                  return (score, r.content)
              except Exception as e:
                  print(f"  x score error: {e}")
              return None

          def save_best(candidates, filename):
              if not candidates:
                  print(f"  No valid images for {filename}")
                  return False
              candidates.sort(key=lambda x: x[0], reverse=True)
              with open(filename, "wb") as f:
                  f.write(candidates[0][1])
              print(f"  >> Saved {filename} (best score={candidates[0][0]})")
              return True

          # ── Parse index.html ──────────────────────────────────────────
          with open("index.html", "r") as f:
              html = f.read()

          # Hero URLs — unique, order preserved
          hero_urls = list(dict.fromkeys(
              re.findall(r'class="hero[^"]*"\s+href="([^"]+)"', html)
          ))
          print(f"Hero URLs: {hero_urls}\n")

          # Column thumbnail slots — find first href after each img src
          def url_after_img(src_name):
              pattern = rf'src="{src_name}".*?<a[^>]+href="([^"]+)"'
              m = re.search(pattern, html, re.DOTALL)
              if m:
                  print(f"  {src_name} -> {m.group(1)[:70]}")
                  return m.group(1)
              print(f"  {src_name} -> NOT FOUND")
              return None

          print("Column URL mapping:")
          slots = [
              (hero_urls,                        "hero.jpg",        True),
              (url_after_img("img_left1.jpg"),   "img_left1.jpg",   False),
              (url_after_img("img_left2.jpg"),   "img_left2.jpg",   False),
              (url_after_img("img_center1.jpg"), "img_center1.jpg", False),
              (url_after_img("img_center2.jpg"), "img_center2.jpg", False),
              (url_after_img("img_right1.jpg"),  "img_right1.jpg",  False),
          ]

          # ── Fetch each slot ───────────────────────────────────────────
          for url_or_list, filename, multi in slots:
              print(f"\n=== {filename} ===")
              candidates = []
              urls = url_or_list if multi else ([url_or_list] if url_or_list else [])
              for url in urls:
                  if not url:
                      continue
                  og = get_og_image(url)
                  if og:
                      result = fetch_and_score(og)
                      if result:
                          candidates.append(result)
                  time.sleep(1)  # be polite to archive.is

              if not save_best(candidates, filename) and filename == "hero.jpg":
                  # Last resort fallback for hero only
                  try:
                      fb = requests.get(
                          "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/"
                          "US_Navy_030501-N-5362A-004_President_George_W._Bush_speaks_aboard_USS_Abraham_Lincoln.jpg/"
                          "640px-US_Navy_030501-N-5362A-004_President_George_W._Bush_speaks_aboard_USS_Abraham_Lincoln.jpg",
                          timeout=12)
                      with open("hero.jpg", "wb") as f:
                          f.write(fb.content)
                      print("  >> Saved Wikipedia fallback for hero")
                  except Exception as e:
                      print(f"  fallback failed: {e}")

          print("\nAll done.")
          EOF

      - name: Commit images
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          for f in hero.jpg img_left1.jpg img_left2.jpg img_center1.jpg img_center2.jpg img_right1.jpg; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --staged --quiet || git commit -m "Update images"
          git push
