name: Update Headlines

on:
  schedule:
    - cron: '*/15 * * * *'   # Every 15 min (GitHub's practical minimum)
  workflow_dispatch:

jobs:
  update-headlines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests beautifulsoup4 lxml

      - name: Fetch RSS and rewrite headlines
        run: |
          python3 - << 'EOF'
          import requests, re, html as htmllib
          from bs4 import BeautifulSoup
          from datetime import datetime, timezone

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0 Safari/537.36",
          }

          # ── RSS sources ────────────────────────────────────────────────
          RSS_FEEDS = [
              ("AP Top News",    "https://feeds.apnews.com/rss/apf-topnews"),
              ("Reuters World",  "https://feeds.reuters.com/reuters/worldNews"),
              ("Reuters US",     "https://feeds.reuters.com/reuters/domesticNews"),
              ("BBC World",      "http://feeds.bbci.co.uk/news/world/rss.xml"),
              ("NPR News",       "https://feeds.npr.org/1001/rss.xml"),
          ]

          SKIP_WORDS = ["subscribe", "newsletter", "podcast", "listen now", "watch live", "photo gallery"]

          def fetch_rss(name, url):
              try:
                  r = requests.get(url, headers=HEADERS, timeout=12)
                  r.raise_for_status()
                  soup = BeautifulSoup(r.content, "xml")
                  items = []
                  for item in soup.find_all("item")[:8]:
                      title = item.find("title")
                      link  = item.find("link")
                      if not title or not link:
                          continue
                      t = htmllib.unescape(title.get_text(strip=True))
                      l = link.get_text(strip=True) if link.get_text(strip=True).startswith("http") else link.next_sibling
                      if not l or not str(l).startswith("http"):
                          continue
                      l = str(l).strip()
                      # Skip boring items
                      if any(w in t.lower() for w in SKIP_WORDS):
                          continue
                      # Truncate long titles
                      if len(t) > 80:
                          t = t[:77] + "..."
                      items.append((t, l))
                  print(f"  {name}: {len(items)} stories")
                  return items
              except Exception as e:
                  print(f"  {name} FAILED: {e}")
                  return []

          def make_teaser_line(title, url, color=None, italic=False):
              escaped_title = htmllib.escape(title).upper()
              if not escaped_title.endswith("..."):
                  escaped_title += "..."
              inner = f'<i>{escaped_title}</i>' if italic else escaped_title
              if color:
                  inner = f'<font color="{color}">{inner}</font>'
              return f'<a href="{htmllib.escape(url)}">{inner}</a><br>'

          def make_hero_line(title, url, red=False):
              escaped = htmllib.escape(title.upper())
              cls = 'class="hero red"' if red else 'class="hero"'
              return f'<a {cls} href="{htmllib.escape(url)}">{escaped}</a>'

          # ── Fetch all feeds ────────────────────────────────────────────
          all_stories = []
          for name, url in RSS_FEEDS:
              stories = fetch_rss(name, url)
              all_stories.extend(stories)

          # Deduplicate by URL
          seen_urls = set()
          unique = []
          for t, u in all_stories:
              if u not in seen_urls:
                  seen_urls.add(u)
                  unique.append((t, u))

          print(f"Total unique stories: {len(unique)}")

          if len(unique) < 4:
              print("Too few stories — skipping update to preserve existing content")
              exit(0)

          # ── Build new teaser block (top 10 stories, first 2 red) ──────
          teaser_lines = []
          for i, (title, url) in enumerate(unique[:10]):
              color = "#cc0000" if i < 2 else None
              italic = (i % 3 == 2)   # every 3rd is italic for visual variety
              teaser_lines.append(make_teaser_line(title, url, color=color, italic=italic))

          new_teasers = "\n".join(teaser_lines)

          # ── Build new hero block (top 7 stories, first 2 red) ─────────
          hero_lines = []
          for i, (title, url) in enumerate(unique[:7]):
              red = (i < 2)
              hero_lines.append(make_hero_line(title, url, red=red))

          new_hero_inner = "\n".join(hero_lines)
          new_hero_block = f'<div style="text-align:center; padding:2px 0;">\n<b>\n{new_hero_inner}\n</b>\n</div>'

          # ── Patch index.html ───────────────────────────────────────────
          with open("index.html", "r") as f:
              page = f.read()

          # Replace teasers
          page = re.sub(
              r'<!-- AUTO-TEASERS-START -->.*?<!-- AUTO-TEASERS-END -->',
              f'<!-- AUTO-TEASERS-START -->\n{new_teasers}\n<!-- AUTO-TEASERS-END -->',
              page, flags=re.DOTALL
          )

          # Replace hero headlines
          page = re.sub(
              r'<!-- AUTO-HERO-START -->.*?<!-- AUTO-HERO-END -->',
              f'<!-- AUTO-HERO-START -->\n{new_hero_block}\n<!-- AUTO-HERO-END -->',
              page, flags=re.DOTALL
          )

          # Update the date/time stamp in footer
          now_utc = datetime.now(timezone.utc)
          day_name = now_utc.strftime("%A").upper()
          month_name = now_utc.strftime("%B").upper()
          day_num = now_utc.strftime("%-d")
          year = now_utc.year
          time_str = now_utc.strftime("%H:%M UTC")
          new_stamp = f"{day_name}, {month_name} {day_num}, {year} &#9632; UPDATED {time_str}"
          page = re.sub(
              r'ALWAYS EDITED BY A HUMAN BEING &#9632; [^<]+',
              f'ALWAYS EDITED BY A HUMAN BEING &#9632; {new_stamp}',
              page
          )

          with open("index.html", "w") as f:
              f.write(page)

          print("index.html updated successfully.")
          EOF

      - name: Commit updated headlines
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update headlines $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
